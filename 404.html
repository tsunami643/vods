<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>tsunami's twitch vods</title>
    <script type="text/javascript">
      // Redirect old path-based routes to hash-based routes.
      // e.g. howdoiplay.com/vods/video/xyz?time=1h2m3s
      //   -> howdoiplay.com/vods/#/video/xyz?time=1h2m3s
      (function () {
        var l = window.location;
        var pathSegmentsToKeep = 1; // preserve /vods base path
        var parts = l.pathname.split('/');
        var basePath = parts.slice(0, 1 + pathSegmentsToKeep).join('/');
        var routePath = '/' + parts.slice(1 + pathSegmentsToKeep).join('/');

        // Skip redirect if there is no meaningful route beyond the base
        if (routePath === '/' || routePath === '') return;

        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          basePath + '/#' + routePath + (l.search || '') + l.hash
        );
      })();
    </script>
  </head>
  <body>
  </body>
</html>
